# harn configuration — generated by `harn init`
# This file should be committed to version control.

[project]
name = "harn"
created = "2026-04-07"
harn_version = "0.1.0"

[tools]
agents = ["codex", "claude-code"]

[init]
stack = "rust"

[init.file_hashes]
# No init hashes tracked. harn's own docs are all hand-authored (already customized).
# Workflow templates (exec-plan.md, sprint-contract.md, handoff.md) ARE the canonical
# source that harn embeds — tracking them would produce false "not customized" warnings.

[check]
required_files = [
    "AGENTS.md",
    "ARCHITECTURE.md",
    "docs/evaluation/criteria.md",
]

[gc]
stale_threshold_days = 14
ignore_paths = [
    "docs/HARNESS-SPEC.md",
    "docs/HARNESS-GUIDE.md",
    "docs/HARNESS-SPEC.zh-CN.md",
    "docs/HARNESS-GUIDE.zh-CN.md",
]

[[gc.mappings]]
doc = "docs/commands.md"
code = ["src/main.rs", "src/cli.rs", "src/init/mod.rs", "src/plan.rs", "src/sprint.rs", "src/check.rs", "src/gc.rs", "src/score.rs", "src/upgrade.rs", "src/status.rs", "src/assess/mod.rs", "src/assess/checks.rs", "src/assess/report.rs", "src/detect.rs", "src/types.rs", "src/config.rs", "src/util.rs"]

[[gc.mappings]]
doc = "docs/generated-content.md"
code = ["templates/AGENTS.md.j2", "templates/ARCHITECTURE.md.j2", "templates/CLAUDE.md.j2", "templates/docs/design-docs/core-beliefs.md.j2", "templates/docs/design-docs/index.md.j2", "templates/docs/evaluation/criteria.md.j2", "templates/docs/templates/exec-plan.md", "templates/docs/templates/sprint-contract.md", "templates/docs/templates/handoff.md"]

[[gc.mappings]]
doc = "docs/design.md"
code = ["src/main.rs", "src/cli.rs", "src/config.rs", "src/types.rs", "src/detect.rs", "src/init/mod.rs", "src/init/render.rs", "src/plan.rs", "src/sprint.rs", "src/check.rs", "src/gc.rs", "src/score.rs", "src/upgrade.rs", "src/status.rs", "src/util.rs", "src/assess/mod.rs", "src/assess/checks.rs", "src/assess/report.rs"]

[[gc.mappings]]
doc = "ARCHITECTURE.md"
code = ["src/main.rs", "src/cli.rs", "src/config.rs", "src/detect.rs", "src/init/mod.rs", "src/init/render.rs", "src/plan.rs", "src/sprint.rs", "src/check.rs", "src/gc.rs", "src/score.rs", "src/upgrade.rs", "src/status.rs", "src/types.rs", "src/util.rs", "src/assess/mod.rs", "src/assess/checks.rs", "src/assess/report.rs", "tests/architecture.rs", "tests/helpers/mod.rs"]

[[gc.mappings]]
doc = "docs/evaluation/criteria.md"
code = ["src/check.rs", "src/score.rs", "templates/docs/evaluation/criteria.md.j2"]

[[gc.mappings]]
doc = "docs/product-spec.md"
code = ["src/cli.rs", "src/init/mod.rs", "src/config.rs"]
